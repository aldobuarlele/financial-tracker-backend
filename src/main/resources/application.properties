spring.application.name=finance-tracker

# 1. Konfigurasi Database PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/finance_db
spring.datasource.username=finance_user
spring.datasource.password=finance_pass

# 2. Konfigurasi Hibernate (JPA)
# Update schema otomatis saat coding (hati-hati di production, tapi oke untuk dev)
spring.jpa.hibernate.ddl-auto=update
# Tampilkan query SQL di log agar kita bisa debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. Server Configuration
server.port=8080